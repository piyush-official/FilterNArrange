openapi: 3.1.0
info:
  title: FilterNArrange Gateway → Data-engine Internal API
  version: 1.1.0
  license:
    name: Apache-2.0
servers:
  - url: http://data-engine:8000
tags:
  - name: detect
  - name: filter
  - name: convert
  - name: analyze
  - name: sheets
  - name: health
paths:
  /health:
    get:
      tags: [health]
      operationId: internalHealth
      deprecated: true
      description: |
        Liveness probe — kept as a deprecated stub during the Plan A → Plan B
        transition. Use the data-engine probe (`/healthz`) instead.
        Scheduled for removal in Plan G.
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, example: UP }
  /detect:
    post:
      tags: [detect]
      operationId: engineDetect
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefRequest' }
      responses:
        '200':
          description: detected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DetectResult' }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }
  /filter:
    post:
      tags: [filter]
      operationId: engineFilter
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FilterRequest' }
      responses:
        '200':
          description: filtered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FilterResult' }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }
  /convert:
    post:
      tags: [convert]
      operationId: engineConvert
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConvertRequest' }
      responses:
        '200':
          description: converted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConvertResult' }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }
  /analyze:
    post:
      tags: [analyze]
      operationId: engineAnalyze
      description: Added in 1.1.0 — runs an analysis plugin against an upload, with an optional filter step.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnalyzeRequest' }
      responses:
        '200':
          description: analysis result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalyzeResult' }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }
  /sheets:
    post:
      tags: [sheets]
      operationId: engineSheets
      description: Added in 1.1.0 — returns the sheet names for a multi-sheet XLSX upload.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SheetsRequest' }
      responses:
        '200':
          description: sheet names
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SheetsResult' }
        '4XX': { $ref: '#/components/responses/Error' }
        '5XX': { $ref: '#/components/responses/Error' }
components:
  responses:
    Error:
      description: structured plugin or engine error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  schemas:
    RefRequest:
      type: object
      required: [ref]
      properties:
        ref: { type: string }
    Column:
      type: object
      required: [name, type, nullable]
      properties:
        name: { type: string }
        type:
          type: string
          enum: [string, number, integer, boolean, datetime, "null"]
        nullable: { type: boolean }
    DetectResult:
      type: object
      required: [format, confidence, schema]
      properties:
        format: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }
        schema:
          type: array
          items: { $ref: '#/components/schemas/Column' }
    ColumnFilterSpec:
      type: object
      required: [kind, keep]
      properties:
        kind: { type: string, enum: [column] }
        keep:
          type: array
          items: { type: string }
    RowFilterPredicate:
      type: object
      required: [col, op]
      properties:
        col: { type: string }
        op:
          type: string
          enum: [eq, ne, gt, gte, lt, lte, contains, starts_with, ends_with, regex, in, not_in, is_null, is_not_null]
        value: {}
    RowFilterSpec:
      type: object
      required: [kind, predicate]
      properties:
        kind: { type: string, enum: [row] }
        predicate: { $ref: '#/components/schemas/RowFilterPredicate' }
    ExpressionFilterSpec:
      type: object
      required: [kind, expr]
      properties:
        kind: { type: string, enum: [expression] }
        expr: { type: string }
    RegexFilterSpec:
      type: object
      required: [kind, pattern]
      properties:
        kind: { type: string, enum: [regex] }
        pattern: { type: string }
        flags:
          type: array
          items: { type: string, enum: [i, m, s] }
          default: []
    FilterSpec:
      description: Added in 1.1.0 — discriminated union of the four filter kinds.
      oneOf:
        - $ref: '#/components/schemas/ColumnFilterSpec'
        - $ref: '#/components/schemas/RowFilterSpec'
        - $ref: '#/components/schemas/ExpressionFilterSpec'
        - $ref: '#/components/schemas/RegexFilterSpec'
      discriminator:
        propertyName: kind
        mapping:
          column: '#/components/schemas/ColumnFilterSpec'
          row: '#/components/schemas/RowFilterSpec'
          expression: '#/components/schemas/ExpressionFilterSpec'
          regex: '#/components/schemas/RegexFilterSpec'
    FilterRequest:
      type: object
      required: [ref, filter]
      properties:
        ref: { type: string }
        filter: { $ref: '#/components/schemas/FilterSpec' }
        sampleSize: { type: integer, default: 20 }
    FilterResult:
      type: object
      required: [schema, rows]
      properties:
        schema:
          type: array
          items: { $ref: '#/components/schemas/Column' }
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
    ConvertRequest:
      type: object
      required: [ref, filter, outputFormat]
      properties:
        ref: { type: string }
        filter: { $ref: '#/components/schemas/ColumnFilterSpec' }
        outputFormat: { type: string, enum: [csv, json] }
    ConvertResult:
      type: object
      required: [resultRef]
      properties:
        resultRef: { type: string }
    AnalysisSpec:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [summary_stats, group_by, chart_suggest, schema_infer]
        options:
          type: object
          additionalProperties: true
    AnalyzeRequest:
      type: object
      required: [ref, analysis]
      properties:
        ref: { type: string }
        analysis: { $ref: '#/components/schemas/AnalysisSpec' }
        filter:
          allOf:
            - $ref: '#/components/schemas/FilterSpec'
          nullable: true
    AnalyzeResult:
      type: object
      required: [kind, payload, warnings]
      properties:
        kind: { type: string }
        payload:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items: { type: string }
    SheetsRequest:
      type: object
      required: [ref]
      properties:
        ref: { type: string }
    SheetsResult:
      type: object
      required: [sheets]
      properties:
        sheets:
          type: array
          items: { type: string }
    ErrorEnvelope:
      type: object
      required: [code, message, traceId]
      properties:
        code: { type: string }
        pluginId: { type: string, nullable: true }
        message: { type: string }
        traceId: { type: string }
