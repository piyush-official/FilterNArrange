openapi: 3.1.0
info:
  title: FilterNArrange Gateway Public API
  version: 1.1.0
  description: REST surface consumed by the React frontend.
  license:
    name: Apache-2.0
servers:
  - url: /api/v1
tags:
  - name: auth
  - name: upload
  - name: pipeline
  - name: download
  - name: health
paths:
  /health:
    get:
      tags: [health]
      operationId: health
      deprecated: true
      description: |
        Liveness probe — kept as a deprecated stub during the Plan A → Plan B
        transition. Use the gateway actuator (`/actuator/health`) and the
        data-engine probe (`/healthz`) instead. Scheduled for removal in
        Plan G.
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, example: UP }
  /auth/signup:
    post:
      tags: [auth]
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignupRequest' }
      responses:
        '200':
          description: signed up
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /auth/login:
    post:
      tags: [auth]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: logged in
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/Error' }
  /auth/me:
    get:
      tags: [auth]
      operationId: me
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: current user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Error' }
  /upload:
    post:
      tags: [upload]
      operationId: upload
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: uploaded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadResponse' }
        '413': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
  /detect:
    post:
      tags: [pipeline]
      operationId: detect
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DetectRequest' }
      responses:
        '200':
          description: detected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DetectResponse' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /filter/preview:
    post:
      tags: [pipeline]
      operationId: filterPreview
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FilterPreviewRequest' }
      responses:
        '200':
          description: preview
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FilterPreviewResponse' }
        '400': { $ref: '#/components/responses/Error' }
  /convert:
    post:
      tags: [pipeline]
      operationId: convert
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConvertRequest' }
      responses:
        '200':
          description: result-ready
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConvertResponse' }
        '400': { $ref: '#/components/responses/Error' }
  /analyze:
    post:
      tags: [pipeline]
      operationId: analyze
      security: [{ bearerAuth: [] }]
      description: |
        Run an analysis (summary stats, group-by, chart-suggest, schema-infer)
        on an uploaded file. An optional filter step is applied before the
        analysis. Added in 1.1.0.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnalyzeRequest' }
      responses:
        '200':
          description: analysis result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalyzeResponse' }
        '400': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
  /uploads/{id}/sheets:
    get:
      tags: [pipeline]
      operationId: listSheets
      security: [{ bearerAuth: [] }]
      description: |
        List sheet names in a multi-sheet upload (XLSX). 400 if the upload
        is not multi-sheet-shaped. Added in 1.1.0.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: sheet names
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SheetsResponse' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /download/{resultId}:
    get:
      tags: [download]
      operationId: download
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: resultId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '302':
          description: redirect to pre-signed MinIO URL
          headers:
            Location:
              schema: { type: string }
        '404': { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Error:
      description: structured error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  schemas:
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        displayName: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user: { $ref: '#/components/schemas/User' }
    User:
      type: object
      required: [id, email]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
    UploadResponse:
      type: object
      required: [uploadId, ref, sizeBytes]
      properties:
        uploadId: { type: string, format: uuid }
        ref: { type: string }
        sizeBytes: { type: integer, format: int64 }
    DetectRequest:
      type: object
      required: [uploadId]
      properties:
        uploadId: { type: string, format: uuid }
    Column:
      type: object
      required: [name, type, nullable]
      properties:
        name: { type: string }
        type:
          type: string
          enum: [string, number, integer, boolean, datetime, "null"]
        nullable: { type: boolean }
    DetectResponse:
      type: object
      required: [format, confidence, schema]
      properties:
        format: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }
        schema:
          type: array
          items: { $ref: '#/components/schemas/Column' }
    ColumnFilterSpec:
      type: object
      required: [kind, keep]
      properties:
        kind: { type: string, enum: [column] }
        keep:
          type: array
          items: { type: string }
    RowFilterPredicate:
      type: object
      required: [col, op]
      properties:
        col: { type: string }
        op:
          type: string
          enum: [eq, ne, gt, gte, lt, lte, contains, starts_with, ends_with, regex, in, not_in, is_null, is_not_null]
        value:
          description: present for ops other than is_null / is_not_null
    RowFilterSpec:
      type: object
      required: [kind, predicate]
      properties:
        kind: { type: string, enum: [row] }
        predicate: { $ref: '#/components/schemas/RowFilterPredicate' }
    ExpressionFilterSpec:
      type: object
      required: [kind, expr]
      properties:
        kind: { type: string, enum: [expression] }
        expr:
          type: string
          description: SQL-ish expression with AND/OR/NOT and = / != / <,<=,>,>=
    RegexFilterSpec:
      type: object
      required: [kind, pattern]
      properties:
        kind: { type: string, enum: [regex] }
        pattern: { type: string }
        flags:
          type: array
          items: { type: string, enum: [i, m, s] }
          default: []
    FilterSpec:
      description: Added in 1.1.0 — discriminated union of the four filter kinds.
      oneOf:
        - $ref: '#/components/schemas/ColumnFilterSpec'
        - $ref: '#/components/schemas/RowFilterSpec'
        - $ref: '#/components/schemas/ExpressionFilterSpec'
        - $ref: '#/components/schemas/RegexFilterSpec'
      discriminator:
        propertyName: kind
        mapping:
          column: '#/components/schemas/ColumnFilterSpec'
          row: '#/components/schemas/RowFilterSpec'
          expression: '#/components/schemas/ExpressionFilterSpec'
          regex: '#/components/schemas/RegexFilterSpec'
    FilterPreviewRequest:
      type: object
      required: [uploadId, filter]
      properties:
        uploadId: { type: string, format: uuid }
        filter: { $ref: '#/components/schemas/FilterSpec' }
        sampleSize: { type: integer, default: 20, minimum: 1, maximum: 500 }
    FilterPreviewResponse:
      type: object
      required: [schema, rows]
      properties:
        schema:
          type: array
          items: { $ref: '#/components/schemas/Column' }
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
    ConvertRequest:
      type: object
      required: [uploadId, filter, outputFormat]
      properties:
        uploadId: { type: string, format: uuid }
        filter: { $ref: '#/components/schemas/ColumnFilterSpec' }
        outputFormat:
          type: string
          enum: [csv, json]
    ConvertResponse:
      type: object
      required: [resultId, ref]
      properties:
        resultId: { type: string, format: uuid }
        ref: { type: string }
    AnalysisSpec:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [summary_stats, group_by, chart_suggest, schema_infer]
        options:
          type: object
          additionalProperties: true
    AnalyzeRequest:
      type: object
      required: [uploadId, analysis]
      properties:
        uploadId: { type: string, format: uuid }
        analysis: { $ref: '#/components/schemas/AnalysisSpec' }
        filter:
          allOf:
            - $ref: '#/components/schemas/FilterSpec'
          nullable: true
          description: optional filter applied before analysis
    AnalyzeResponse:
      type: object
      required: [kind, payload, warnings]
      properties:
        kind: { type: string }
        payload:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items: { type: string }
    SheetsResponse:
      type: object
      required: [sheets]
      properties:
        sheets:
          type: array
          items: { type: string }
    ErrorEnvelope:
      type: object
      required: [code, message, traceId]
      properties:
        code: { type: string }
        pluginId: { type: string, nullable: true }
        message: { type: string }
        traceId: { type: string }
