# FilterNArrange — local dev compose stack.
# All services on a single bridge network. Healthchecks on every service so
# `docker compose up --wait` exits green only when the stack is actually ready.

name: filternarrange

x-restart: &restart
  restart: unless-stopped

services:
  # ---------- Persistence ----------------------------------------------------
  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-filternarrange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-filternarrange}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [filternarrange]

  keycloak:
    # Plan G §T1 — dev OIDC provider. Auto-imports the filternarrange realm on
    # first boot. Quay image so it doesn't require a docker.io login.
    image: quay.io/keycloak/keycloak:25.0
    <<: *restart
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-mem
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/filternarrange-realm.json:ro
    ports:
      - "8085:8080"
    healthcheck:
      # Keycloak 25 + Quarkus 3.8 / Vert.x: a bare HTTP/1.0 request with no
      # Host header NPEs at HttpServerRequest.authority(). Use HTTP/1.1 with
      # an explicit Host header; the openid-configuration endpoint is public
      # so a 200 means the realm imported and the HTTP stack is serving.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/filternarrange/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [filternarrange]

  redis:
    # Valkey 7 — drop-in Redis-OSS fork with no SSPL drift risk (ADR-0001).
    image: valkey/valkey:7-alpine
    <<: *restart
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks: [filternarrange]

  redpanda:
    image: redpandadata/redpanda:latest
    <<: *restart
    command:
      - redpanda
      - start
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --overprovisioned
      - --node-id
      - "0"
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--exit-when-healthy"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks: [filternarrange]

  kafka-init:
    # One-shot job — creates the four v1 Kafka topics (Plan D §5) and exits.
    # Downstream gateway / data-engine services that consume topics depend on
    # `service_completed_successfully` so we don't race against topic creation.
    build:
      context: ../kafka-init
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      REDPANDA_BROKERS: redpanda:9092
    restart: "no"
    networks: [filternarrange]

  minio:
    image: minio/minio:latest
    <<: *restart
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-filternarrange}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks: [filternarrange]

  # ---------- AI runtime -----------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    <<: *restart
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      # `ollama list` exits 0 when the daemon is reachable, even with no models.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks: [filternarrange]

  ollama-init:
    # One-shot job — pulls the default models, then exits. `docker compose up`
    # treats this as completed-successfully via the `service_completed_successfully`
    # condition used by downstream services that need the models present.
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - sh
      - -c
      - |
        set -e
        echo "Pulling ${NL2FILTER_MODEL:-qwen2.5:7b}..."
        ollama pull "${NL2FILTER_MODEL:-qwen2.5:7b}"
        echo "Pulling ${SUMMARY_MODEL:-llama3.1:8b}..."
        ollama pull "${SUMMARY_MODEL:-llama3.1:8b}"
        echo "Default models present."
    restart: "no"
    networks: [filternarrange]

  # ---------- Application services ------------------------------------------
  gateway:
    build:
      # Repo-root context so apps/gateway/build.gradle.kts's
      # ../../contracts source-set entry resolves; see gateway Dockerfile
      # for the matching COPY paths.
      context: ../..
      dockerfile: apps/gateway/Dockerfile
    <<: *restart
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-filternarrange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-filternarrange}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: redpanda:9092
      REDPANDA_BROKERS: redpanda:9092
      KAFKA_LISTENER_AUTOSTART: "true"
      MINIO_ENDPOINT: http://minio:9000
      # The MinIO server reads MINIO_ROOT_USER/PASSWORD; the gateway
      # client config (application.yml) reads MINIO_ACCESS_KEY/SECRET_KEY.
      # Bridge the two so the same defaults flow through.
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-filternarrange}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-spring-jwt}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s
    networks: [filternarrange]

  data-engine:
    build:
      context: ../../apps/data-engine
      dockerfile: Dockerfile
    <<: *restart
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATA_ENGINE_MODE: ${DATA_ENGINE_MODE:-full}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: redpanda:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-filternarrange}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      OLLAMA_HOST: http://ollama:11434
      NL2FILTER_MODEL: ${NL2FILTER_MODEL:-qwen2.5:7b}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-llama3.1:8b}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      AI_MAX_CONCURRENT: ${AI_MAX_CONCURRENT:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FILTERNARRANGE_DISABLED_PLUGINS: ${FILTERNARRANGE_DISABLED_PLUGINS:-}
    ports:
      - "8000:8000"
    healthcheck:
      # FastAPI app registers /healthz (api/main.py), not /health.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks: [filternarrange]

  retention-worker:
    # Plan F §T29 — Python retention sweeper. Same image as data-engine but
    # overrides the entrypoint to run the CLI in --loop mode. Sweeps every
    # RETENTION_INTERVAL_MINUTES (default 60) and exits cleanly on SIGTERM.
    build:
      context: ../../apps/data-engine
      dockerfile: Dockerfile
    <<: *restart
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-filternarrange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-filternarrange}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-filternarrange}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      UPLOAD_RETENTION_FREE_HOURS: ${UPLOAD_RETENTION_FREE_HOURS:-24}
      UPLOAD_RETENTION_PAID_DAYS: ${UPLOAD_RETENTION_PAID_DAYS:-30}
      RESULT_RETENTION_FREE_HOURS: ${RESULT_RETENTION_FREE_HOURS:-24}
      RESULT_RETENTION_PAID_DAYS: ${RESULT_RETENTION_PAID_DAYS:-30}
      RETENTION_INTERVAL_MINUTES: ${RETENTION_INTERVAL_MINUTES:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command: ["retention-sweep", "--loop"]
    # Disable the inherited data-engine HEALTHCHECK — retention-worker is a
    # long-running CLI sweeper, not an HTTP server, so curling :8000 always
    # fails. Treat liveness as ``the process is running``.
    healthcheck:
      disable: true
    networks: [filternarrange]

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    <<: *restart
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      # busybox wget resolves localhost to ::1 first, but nginx listens
      # only on 0.0.0.0:80 — pin to IPv4 explicitly.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [filternarrange]

  backup:
    # Plan G §T14 — nightly pg_dump + mc mirror; both write to MinIO. Schedule
    # lives in infra/backup/crontab.
    build:
      context: ../backup
    <<: *restart
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-filternarrange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-filternarrange}
      MINIO_HOST: minio
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-filternarrange}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
    networks: [filternarrange]

  # ---------- Observability (Plan G §T7) ------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    <<: *restart
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    networks: [filternarrange]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    <<: *restart
    volumes:
      - ../observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks: [filternarrange]

  grafana:
    image: grafana/grafana-oss:11.2.0
    <<: *restart
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ../observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      # Plan G §T13 — auto-load the five FilterNArrange dashboards on start.
      # The provider config sits in /etc/grafana/provisioning/dashboards/;
      # the JSON tree it points at sits separately under /var/lib/grafana/
      # so Docker doesn't refuse to overlay a file inside the same dir.
      - ../observability/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks: [filternarrange]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    <<: *restart
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    command: ["--path.rootfs=/host"]
    networks: [filternarrange]

  # Plan G §T8 — Loki receives logs from Promtail and serves them to
  # Grafana. Single-binary mode with local filesystem storage; adequate for
  # dev. See infra/observability/loki/loki-config.yml.
  loki:
    image: grafana/loki:3.1.1
    <<: *restart
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ../observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    ports:
      - "3100:3100"
    networks: [filternarrange]

  # Plan G §T8 — Promtail tails container stdout/stderr via the Docker
  # socket and ships to Loki. Auto-discovers fna-* containers.
  promtail:
    image: grafana/promtail:3.1.1
    <<: *restart
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ../observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    networks: [filternarrange]

  # Plan G §T8 — Tempo trace backend. Accepts OTLP gRPC on 4317 and HTTP
  # on 4318. 24-hour block retention in dev.
  tempo:
    image: grafana/tempo:2.6.0
    <<: *restart
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ../observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    ports:
      - "3200:3200"
    networks: [filternarrange]

  # Plan G §T8 — OTel Collector multiplexes OTLP from gateway + data-engine
  # to Tempo (traces), Loki (logs), and an internal Prometheus exporter
  # (metrics, scraped at :8889).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    <<: *restart
    command: ["--config=/etc/otelcol/otel-collector.yml"]
    volumes:
      - ../observability/otel-collector/otel-collector.yml:/etc/otelcol/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on: [tempo, loki]
    networks: [filternarrange]

  caddy:
    image: caddy:2-alpine
    <<: *restart
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "8443:8443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      # Dev Caddyfile binds `:8443` as a port-only site; without an explicit
      # hostname, `local_certs` doesn't kick in and the server is plain HTTP.
      # Prod Caddyfile uses a real hostname + Let's Encrypt where this is
      # HTTPS. See ../caddy/Caddyfile and infra/caddy/Caddyfile.prod.
      test: ["CMD", "wget", "-qO-", "http://localhost:8443/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [filternarrange]

# ---------- Volumes / networks ---------------------------------------------
volumes:
  postgres-data:
  redis-data:
  redpanda-data:
  minio-data:
  ollama-data:
  caddy-data:
  caddy-config:

networks:
  filternarrange:
    name: filternarrange
    driver: bridge
