# FilterNArrange — local dev compose stack.
# All services on a single bridge network. Healthchecks on every service so
# `docker compose up --wait` exits green only when the stack is actually ready.

name: filternarrange

x-restart: &restart
  restart: unless-stopped

services:
  # ---------- Persistence ----------------------------------------------------
  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-filternarrange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-filternarrange}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [filternarrange]

  keycloak:
    # Plan G §T1 — dev OIDC provider. Auto-imports the filternarrange realm on
    # first boot. Quay image so it doesn't require a docker.io login.
    image: quay.io/keycloak/keycloak:25.0
    <<: *restart
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-mem
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/filternarrange-realm.json:ro
    ports:
      - "8085:8080"
    healthcheck:
      # Keycloak 25's /health endpoint is on the management port (9000) by
      # default. Hitting the openid-configuration is a reliable readiness check.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /realms/filternarrange/.well-known/openid-configuration HTTP/1.0\\n\\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [filternarrange]

  redis:
    # Valkey 7 — drop-in Redis-OSS fork with no SSPL drift risk (ADR-0001).
    image: valkey/valkey:7-alpine
    <<: *restart
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks: [filternarrange]

  redpanda:
    image: redpandadata/redpanda:latest
    <<: *restart
    command:
      - redpanda
      - start
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --overprovisioned
      - --node-id
      - "0"
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--exit-when-healthy"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks: [filternarrange]

  kafka-init:
    # One-shot job — creates the four v1 Kafka topics (Plan D §5) and exits.
    # Downstream gateway / data-engine services that consume topics depend on
    # `service_completed_successfully` so we don't race against topic creation.
    build:
      context: ../kafka-init
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      REDPANDA_BROKERS: redpanda:9092
    restart: "no"
    networks: [filternarrange]

  minio:
    image: minio/minio:latest
    <<: *restart
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-filternarrange}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks: [filternarrange]

  # ---------- AI runtime -----------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    <<: *restart
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      # `ollama list` exits 0 when the daemon is reachable, even with no models.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks: [filternarrange]

  ollama-init:
    # One-shot job — pulls the default models, then exits. `docker compose up`
    # treats this as completed-successfully via the `service_completed_successfully`
    # condition used by downstream services that need the models present.
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - sh
      - -c
      - |
        set -e
        echo "Pulling ${NL2FILTER_MODEL:-qwen2.5:7b}..."
        ollama pull "${NL2FILTER_MODEL:-qwen2.5:7b}"
        echo "Pulling ${SUMMARY_MODEL:-llama3.1:8b}..."
        ollama pull "${SUMMARY_MODEL:-llama3.1:8b}"
        echo "Default models present."
    restart: "no"
    networks: [filternarrange]

  # ---------- Application services ------------------------------------------
  gateway:
    build:
      # Repo-root context so apps/gateway/build.gradle.kts's
      # ../../contracts source-set entry resolves; see gateway Dockerfile
      # for the matching COPY paths.
      context: ../..
      dockerfile: apps/gateway/Dockerfile
    <<: *restart
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-filternarrange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-filternarrange}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: redpanda:9092
      REDPANDA_BROKERS: redpanda:9092
      KAFKA_LISTENER_AUTOSTART: "true"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-filternarrange}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-spring-jwt}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s
    networks: [filternarrange]

  data-engine:
    build:
      context: ../../apps/data-engine
      dockerfile: Dockerfile
    <<: *restart
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATA_ENGINE_MODE: ${DATA_ENGINE_MODE:-full}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: redpanda:9092
      MINIO_ENDPOINT: http://minio:9000
      OLLAMA_HOST: http://ollama:11434
      NL2FILTER_MODEL: ${NL2FILTER_MODEL:-qwen2.5:7b}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-llama3.1:8b}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      AI_MAX_CONCURRENT: ${AI_MAX_CONCURRENT:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FILTERNARRANGE_DISABLED_PLUGINS: ${FILTERNARRANGE_DISABLED_PLUGINS:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks: [filternarrange]

  retention-worker:
    # Plan F §T29 — Python retention sweeper. Same image as data-engine but
    # overrides the entrypoint to run the CLI in --loop mode. Sweeps every
    # RETENTION_INTERVAL_MINUTES (default 60) and exits cleanly on SIGTERM.
    build:
      context: ../../apps/data-engine
      dockerfile: Dockerfile
    <<: *restart
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-filternarrange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-filternarrange}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-filternarrange}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
      UPLOAD_RETENTION_FREE_HOURS: ${UPLOAD_RETENTION_FREE_HOURS:-24}
      UPLOAD_RETENTION_PAID_DAYS: ${UPLOAD_RETENTION_PAID_DAYS:-30}
      RESULT_RETENTION_FREE_HOURS: ${RESULT_RETENTION_FREE_HOURS:-24}
      RESULT_RETENTION_PAID_DAYS: ${RESULT_RETENTION_PAID_DAYS:-30}
      RETENTION_INTERVAL_MINUTES: ${RETENTION_INTERVAL_MINUTES:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command: ["retention-sweep", "--loop"]
    networks: [filternarrange]

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    <<: *restart
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [filternarrange]

  backup:
    # Plan G §T14 — nightly pg_dump + mc mirror; both write to MinIO. Schedule
    # lives in infra/backup/crontab.
    build:
      context: ../backup
    <<: *restart
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-filternarrange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-filternarrange}
      MINIO_HOST: minio
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-filternarrange}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
    networks: [filternarrange]

  # ---------- Observability (Plan G §T7) ------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    <<: *restart
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    networks: [filternarrange]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    <<: *restart
    volumes:
      - ../observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks: [filternarrange]

  grafana:
    image: grafana/grafana-oss:11.2.0
    <<: *restart
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ../observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3001:3000"
    networks: [filternarrange]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    <<: *restart
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    command: ["--path.rootfs=/host"]
    networks: [filternarrange]

  caddy:
    image: caddy:2-alpine
    <<: *restart
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "8443:8443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:8443/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [filternarrange]

# ---------- Volumes / networks ---------------------------------------------
volumes:
  postgres-data:
  redis-data:
  redpanda-data:
  minio-data:
  ollama-data:
  caddy-data:
  caddy-config:

networks:
  filternarrange:
    name: filternarrange
    driver: bridge
