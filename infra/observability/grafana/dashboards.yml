# Plan G §T13 — Grafana provisioning: tells Grafana to load every JSON file
# from /var/lib/grafana/dashboards on startup. The compose service mounts
# this file at /etc/grafana/provisioning/dashboards/dashboards.yml (the
# provider config) and the JSON tree separately at /var/lib/grafana/dashboards
# — Grafana doesn't allow a file mount inside a directory mount at the
# same path, hence the split.

apiVersion: 1
providers:
  - name: filternarrange
    orgId: 1
    folder: FilterNArrange
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
