route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  receiver: dev-log

receivers:
  - name: dev-log
    # Dev-only sink: forwards everything to the otel-collector's log endpoint.
    # Production deployments swap in PagerDuty/Slack/email here.
    webhook_configs:
      - url: "http://otel-collector:4318/v1/logs"
        send_resolved: true
