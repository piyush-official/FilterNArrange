# Plan G §T8 — Promtail scrapes Docker container stdout/stderr and ships
# to Loki. Uses Docker SD to auto-discover ``fna-*`` containers; relabels
# the container name into a job label so Loki queries can filter by service.
# JSON pipeline stage pulls out structured fields emitted by the gateway and
# data-engine logback / structlog configs (Plan G §T11).

server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Drop containers we don't ship logs for (Docker's own infra, anything
      # not named fna-*). Without this, Loki rejects the unmatched streams
      # with "at least one label pair is required per stream" because the
      # next two steps leave container/job unset.
      - source_labels: ['__meta_docker_container_name']
        regex: '/fna-.*'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        regex: '/(fna-.*)'
        target_label: 'container'
      - source_labels: ['container']
        target_label: 'job'
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            user_id: user_id
            job_id: job_id
            plugin_id: plugin_id
            tier: tier
            endpoint: endpoint
      - labels:
          level:
          trace_id:
          plugin_id:
