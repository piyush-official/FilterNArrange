server:
  port: 8080
spring:
  application:
    name: gateway
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:filternarrange}
    username: ${POSTGRES_USER:filternarrange}
    password: ${POSTGRES_PASSWORD:filternarrange}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${REDPANDA_BROKERS:redpanda:9092}
    listener:
      # Plan D §6 — listeners default off so Spring-test contexts come up cleanly
      # in environments without a broker. docker-compose / k8s deployments set
      # KAFKA_LISTENER_AUTOSTART=true to enable the consumers.
      auto-startup: ${KAFKA_LISTENER_AUTOSTART:false}

auth:
  provider: ${AUTH_PROVIDER:spring-jwt}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-32-bytes-min}
    ttl-seconds: 86400

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  buckets:
    uploads: uploads
    results: results
    format-samples: format-samples
    backups: backups

data-engine:
  base-url: ${DATA_ENGINE_URL:http://data-engine:8000}
  connect-timeout-ms: 2000
  read-timeout-ms: 5000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

filternarrange:
  tier:
    # Plan F §5 — daily-ops / upload-MB caps. ``0`` means unlimited.
    free-tier-max-upload-mb: ${FREE_TIER_MAX_UPLOAD_MB:5}
    free-tier-daily-ops:     ${FREE_TIER_DAILY_OPS:100}
    paid-tier-max-upload-mb: ${PAID_TIER_MAX_UPLOAD_MB:500}
    paid-tier-daily-ops:     ${PAID_TIER_DAILY_OPS:0}

resilience4j:
  circuitbreaker:
    instances:
      dataEngine:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 2
