[plugin]
id = "jsonl"
display_name = "JSON Lines"
version = "0.1.0"
license = "Apache-2.0"
author = "FilterNArrange Core"

[detect]
mime_types = ["application/x-ndjson", "application/jsonl"]
extensions = [".jsonl", ".ndjson"]
magic_bytes = []
confidence_strategy = "structural-sniff"

[capabilities]
parse = true
emit = true
streaming = true
shape = "tabular"
