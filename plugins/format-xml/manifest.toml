[plugin]
id = "xml"
display_name = "XML"
version = "0.1.0"
license = "Apache-2.0"
author = "FilterNArrange Core"

[detect]
mime_types = ["application/xml", "text/xml"]
extensions = [".xml"]
magic_bytes = []
confidence_strategy = "magic-byte"

[capabilities]
parse = true
emit = true
streaming = false
shape = "tree"
