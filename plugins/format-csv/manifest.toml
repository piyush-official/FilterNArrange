[plugin]
id = "csv"
display_name = "CSV"
version = "1.0.0"
license = "Apache-2.0"
author = "FilterNArrange Core"

[detect]
mime_types = ["text/csv"]
extensions = [".csv"]
magic_bytes = []
confidence_strategy = "content-sniff"

[capabilities]
parse = true
emit = true
streaming = true
shape = "tabular"
